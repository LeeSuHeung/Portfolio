<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프리미엄 포트폴리오 빌더</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html { scroll-behavior: smooth; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    input:focus { outline: none; box-shadow: none; }
    body { background-color: #FAFAFA; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    
    /* 부드러운 커스텀 그림자 */
    .soft-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); }
  </style>
</head>
<body class="text-slate-800 antialiased min-h-screen pb-24 overflow-x-auto overflow-y-auto relative selection:bg-indigo-100 selection:text-indigo-900">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useRef, useEffect } = React;

    // --- 미니멀 아이콘 세트 (Lucide) ---
    const IconBase = ({ children, size = 20, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );
    const Eye = (p) => <IconBase {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></IconBase>;
    const Edit3 = (p) => <IconBase {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></IconBase>;
    const Download = (p) => <IconBase {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></IconBase>;
    const Trash2 = (p) => <IconBase {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconBase>;
    const ImageIcon = (p) => <IconBase {...p}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></IconBase>;
    const X = (p) => <IconBase {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconBase>;
    const Plus = (p) => <IconBase {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></IconBase>;
    const ChevronLeft = (p) => <IconBase {...p}><polyline points="15 18 9 12 15 6"/></IconBase>;
    const ChevronRight = (p) => <IconBase {...p}><polyline points="9 18 15 12 9 6"/></IconBase>;
    const LinkIcon = (p) => <IconBase {...p}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></IconBase>;
    const MessageSquare = (p) => <IconBase {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></IconBase>;
    const CheckCircle = (p) => <IconBase {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconBase>;
    const RotateCcw = (p) => <IconBase {...p}><polyline points="3 2 3 14 15 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L3 14"/></IconBase>;
    const ArrowDownRight = (p) => <IconBase {...p}><line x1="7" y1="7" x2="17" y2="17"/><polyline points="17 7 17 17 7 17"/></IconBase>;
    const ArrowDownLeft = (p) => <IconBase {...p}><line x1="17" y1="7" x2="7" y2="17"/><polyline points="17 17 7 17 7 7"/></IconBase>;
    const Move = (p) => <IconBase {...p}><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="19 9 22 12 19 15"/><polyline points="9 19 12 22 15 19"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></IconBase>;

    // --- 초기 데이터 세팅 ---
    const initialHeader = {
      name: "게임 기획자",
      email: "GUPABAL@kakao.com",
      phone: "010-4567-5368"
    };

    const initialTimeline = [
      { id: 7, period: "2023.06 ~ 재직중", company: "블루포션게임즈 (사원)", project: "대표 게임: 에오스블랙 | 엔진: 유니티", tags: "에오스블랙, 구조 설계, 수치 밸런스, 라이브 서비스", images: [], cardOffsetX: 0 },
      { id: 6, period: "2021.05 ~ 2023.05", company: "플레이위드게임즈 (사원)", project: "대표 게임: 씰 온라인 M | 엔진: 유니티", tags: "Unity, 시스템 개편, 경제/전투 밸런스", images: [], cardOffsetX: 0 },
      { id: 5, period: "2019.11 ~ 2021.04", company: "모히또게임즈 (사원)", project: "대표 게임: 히어로볼Z, Project M | 엔진: 유니티", tags: "라이브 서비스, 역기획서, 테이블 설계", images: [], cardOffsetX: 0 },
      { id: 4, period: "2018.02 ~ 2019.02", company: "스톰게임즈 (사원)", project: "대표 게임: 라스트 소울 | 엔진: 유니티", tags: "Unity, 시스템 개편", images: [], cardOffsetX: 0 },
      { id: 3, period: "2017.04 ~ 2018.02", company: "805FACTORY (기획 팀장)", project: "대표 게임: 던전 워커 | 엔진: 유니티", tags: "Unity, 팀 리딩/일정 관리, 전투/경제 밸런스", images: [], cardOffsetX: 0 },
      { id: 2, period: "2012.07 ~ 2016.07", company: "LOGIWARE (대리)", project: "대표 게임: 그랑에이지, 소울슬래쉬 사가 | 엔진: 자체 엔진", tags: "시스템 기획, 글로벌 서비스, 자체 엔진", images: [], cardOffsetX: 0 },
      { id: 1, period: "2011.01 ~ 2012.02", company: "GAMEUS (사원)", project: "대표 게임: H.I.S (히어로즈 인 더 스카이) | 엔진: 유니티", tags: "Unity, 데이터 관리, QA", images: [], cardOffsetX: 0 }
    ];

    const isExported = false; 

    // --- 로컬 데이터 로딩 ---
    const loadLocalData = () => {
      if (isExported) return { header: initialHeader, timeline: initialTimeline };
      try {
        const localData = localStorage.getItem('portfolioLocalData');
        if (localData) return JSON.parse(localData);
      } catch(e) { console.error("로컬 데이터를 불러오지 못했습니다.", e); }
      return { header: initialHeader, timeline: initialTimeline };
    };

    const resizeImage = (dataUrl, maxWidth = 1200) => {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const aspectRatio = img.width / img.height;
          let width = img.width;
          let height = img.height;
          if (width > maxWidth) {
            width = maxWidth;
            height = Math.round(width / aspectRatio);
          }
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve({ url: canvas.toDataURL('image/jpeg', 0.85), aspectRatio: aspectRatio });
        };
        img.src = dataUrl;
      });
    };

    // --- 메인 App 컴포넌트 ---
    function App() {
      const initData = loadLocalData();
      const [isEditing, setIsEditing] = useState(true);
      const [header, setHeader] = useState(initData.header);
      const [timeline, setTimeline] = useState(initData.timeline);
      const [lightbox, setLightbox] = useState({ isOpen: false, images: [], currentIndex: 0 });
      const [activeCardId, setActiveCardId] = useState(null);
      const [toastMsg, setToastMsg] = useState('');
      const [isSaved, setIsSaved] = useState(true);
      const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

      useEffect(() => {
        const handleResize = () => setIsMobile(window.innerWidth < 768);
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      const updateTimelineItem = (id, fieldOrUpdates, value) => {
        setTimeline(prev => prev.map(item => {
          if (item.id === id) {
            if (typeof fieldOrUpdates === 'string') return { ...item, [fieldOrUpdates]: value };
            else return { ...item, ...fieldOrUpdates };
          }
          return item;
        }));
      };

      const removeExperience = (id) => setTimeline(prev => prev.filter(item => item.id !== id));

      const addExperience = () => {
        const newItem = {
          id: Date.now(), period: "YYYY.MM ~ YYYY.MM", company: "새로운 회사 (직급)", project: "대표 게임: 프로젝트명 | 엔진: 유니티", tags: "태그1, 태그2",
          images: [], cardWidth: null, cardHeight: null, cardOffsetX: 0, cardOffsetY: 0, lineOffsetX: 0, lineOffsetY: 0
        };
        setTimeline(prev => [newItem, ...prev]); 
      };

      // --- 🛠 카드 크기 무제한 확장 로직 ---
      const [resizingCardIdx, setResizingCardIdx] = useState(null);
      const [cardResizeStart, setCardResizeStart] = useState({x: 0, y: 0, w: 0, h: 0, isCentered: false});
      const [cardResizeDir, setCardResizeDir] = useState(null); 

      const handleCardResizeStart = (e, id, dir, isCentered = false) => {
        e.stopPropagation(); e.preventDefault();
        const rect = e.currentTarget.parentElement.getBoundingClientRect();
        setResizingCardIdx(id);
        setCardResizeDir(dir);
        setCardResizeStart({ x: e.clientX, y: e.clientY, w: rect.width, h: rect.height, isCentered });
      };

      useEffect(() => {
        if (resizingCardIdx === null) return;
        const handleMove = (e) => {
          let deltaX = e.clientX - cardResizeStart.x;
          const deltaY = e.clientY - cardResizeStart.y;
          if (cardResizeStart.isCentered) deltaX *= 2;

          let newW = cardResizeStart.w;
          let newH = cardResizeStart.h;

          if (cardResizeDir === 'e' || cardResizeDir === 'se') newW = Math.max(280, cardResizeStart.w + deltaX);
          if (cardResizeDir === 'w' || cardResizeDir === 'sw') newW = Math.max(280, cardResizeStart.w - deltaX);
          if (cardResizeDir === 's' || cardResizeDir === 'se' || cardResizeDir === 'sw') newH = Math.max(150, cardResizeStart.h + deltaY);
          
          updateTimelineItem(resizingCardIdx, { cardWidth: newW, cardHeight: newH });
        };
        const handleUp = () => { setResizingCardIdx(null); setCardResizeDir(null); };
        window.addEventListener('pointermove', handleMove);
        window.addEventListener('pointerup', handleUp);
        return () => { window.removeEventListener('pointermove', handleMove); window.removeEventListener('pointerup', handleUp); }
      }, [resizingCardIdx, cardResizeStart, cardResizeDir]);

      // --- 🛠 카드 2D 이동 로직 ---
      const [draggingCardOffset, setDraggingCardOffset] = useState(null);
      const handleCardOffsetStart = (e, id, curX, curY) => {
        e.stopPropagation(); e.preventDefault();
        setDraggingCardOffset({ id, startX: e.clientX, startY: e.clientY, startOffsetX: curX || 0, startOffsetY: curY || 0 });
      };

      useEffect(() => {
        if (draggingCardOffset === null) return;
        const handleMove = (e) => {
          const deltaX = e.clientX - draggingCardOffset.startX;
          const deltaY = e.clientY - draggingCardOffset.startY;
          updateTimelineItem(draggingCardOffset.id, {
            cardOffsetX: draggingCardOffset.startOffsetX + deltaX,
            cardOffsetY: draggingCardOffset.startOffsetY + deltaY
          });
        };
        const handleUp = () => setDraggingCardOffset(null);
        window.addEventListener('pointermove', handleMove);
        window.addEventListener('pointerup', handleUp);
        return () => { window.removeEventListener('pointermove', handleMove); window.removeEventListener('pointerup', handleUp); };
      }, [draggingCardOffset]);

      // --- 🛠 선(Line) 앵커 독립 이동 로직 ---
      const [draggingLineOffset, setDraggingLineOffset] = useState(null);
      const handleLineOffsetStart = (e, id, curX, curY) => {
        e.stopPropagation(); e.preventDefault();
        setDraggingLineOffset({ id, startX: e.clientX, startY: e.clientY, startOffsetX: curX || 0, startOffsetY: curY || 0 });
      };

      useEffect(() => {
        if (draggingLineOffset === null) return;
        const handleMove = (e) => {
          const deltaX = e.clientX - draggingLineOffset.startX;
          const deltaY = e.clientY - draggingLineOffset.startY;
          updateTimelineItem(draggingLineOffset.id, {
            lineOffsetX: draggingLineOffset.startOffsetX + deltaX,
            lineOffsetY: draggingLineOffset.startOffsetY + deltaY
          });
        };
        const handleUp = () => setDraggingLineOffset(null);
        window.addEventListener('pointermove', handleMove);
        window.addEventListener('pointerup', handleUp);
        return () => { window.removeEventListener('pointermove', handleMove); window.removeEventListener('pointerup', handleUp); };
      }, [draggingLineOffset]);

      // 로컬스토리지 자동 저장
      useEffect(() => {
        if (isExported) return;
        setIsSaved(false);
        const timer = setTimeout(() => {
          try {
            localStorage.setItem('portfolioLocalData', JSON.stringify({ header, timeline }));
            setIsSaved(true);
          } catch(e) { console.error("저장 실패", e); }
        }, 800); 
        return () => clearTimeout(timer);
      }, [header, timeline]);

      // 클립보드 이미지 붙여넣기
      useEffect(() => {
        const handleGlobalPaste = async (e) => {
          if (!isEditing || isExported) return;
          const items = e.clipboardData?.items;
          if (!items) return;
          const files = [];
          for (let i = 0; i < items.length; i++) {
            if (items[i].type.indexOf('image') !== -1) files.push(items[i].getAsFile());
          }
          if (files.length === 0) return;

          let targetId = activeCardId;
          if (!targetId && timeline.length > 0) { targetId = timeline[0].id; setActiveCardId(targetId); }
          if (!targetId) return;

          const activeItemIndex = timeline.findIndex(t => t.id === targetId);
          if (activeItemIndex === -1) return;
          const activeItem = timeline[activeItemIndex];
          const isLarge = activeItemIndex === 0;

          const processedImages = await Promise.all(files.map(file => {
            return new Promise((resolve) => {
              const reader = new FileReader();
              reader.onload = async (ev) => {
                const { url, aspectRatio } = await resizeImage(ev.target.result);
                const initW = isLarge ? 240 : 160;
                const initH = initW / aspectRatio;
                resolve({ id: Date.now() + Math.random(), src: url, aspectRatio: aspectRatio, width: initW, height: initH, link: "", memos: [] });
              };
              reader.readAsDataURL(file);
            });
          }));
          updateTimelineItem(targetId, 'images', [...activeItem.images, ...processedImages]);
        };
        window.addEventListener('paste', handleGlobalPaste);
        return () => window.removeEventListener('paste', handleGlobalPaste);
      }, [isEditing, activeCardId, timeline]);

      const handleReset = () => {
        if (window.confirm("경고: 모든 데이터가 삭제되고 처음 상태로 초기화됩니다.\n계속하시겠습니까?")) {
          setHeader({ name: "게임 기획자", email: "GUPABAL@kakao.com", phone: "010-4567-5368" });
          setTimeline([]); localStorage.removeItem('portfolioLocalData'); 
          setToastMsg("초기화가 완료되었습니다.");
          setTimeout(() => setToastMsg(''), 4000);
        }
      };

      const handleDownloadHTML = () => {
        const scriptElement = document.querySelector('script[type="text/babel"]');
        if (!scriptElement) { setToastMsg("오류가 발생했습니다."); setTimeout(() => setToastMsg(''), 3000); return; }
        
        let code = scriptElement.innerText;
        const dataReplacement = `\n    const initialHeader = ${JSON.stringify(header, null, 2)};\n    const initialTimeline = ${JSON.stringify(timeline, null, 2)};\n    `;
        code = code.replace(/\/\/ \/\* DATA_START \*\/[\s\S]*?\/\/ \/\* DATA_END \*\//, `// /* DATA_START */${dataReplacement}// /* DATA_END */`);
        code = code.replace(/const \[isEditing, setIsEditing\] = useState\(true\);/, `const [isEditing, setIsEditing] = useState(false);`);
        code = code.replace(/const isExported = false;/, `const isExported = true;`);

        const scriptClose = '<' + '/script>';
        const fullHtml = `<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${header.name} 포트폴리오</title>
  <script src="https://cdn.tailwindcss.com">${scriptClose}
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin>${scriptClose}
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin>${scriptClose}
  <script src="https://unpkg.com/@babel/standalone/babel.min.js">${scriptClose}
  <style>
    html { scroll-behavior: smooth; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    input:focus { outline: none; box-shadow: none; }
    body { background-color: #FAFAFA; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .soft-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); }
  </style>
</head>
<body class="text-slate-800 antialiased min-h-screen pb-24 overflow-x-auto overflow-y-auto relative selection:bg-indigo-100 selection:text-indigo-900">
  <div id="root"></div>
  <script type="text/babel">
${code}
  ${scriptClose}
</body>
</html>`;

        const blob = new Blob([fullHtml], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'portfolio_final.html';
        a.click();
        URL.revokeObjectURL(url);
        
        setToastMsg("HTML 파일이 저장되었습니다!");
        setTimeout(() => setToastMsg(''), 4000);
      };

      // 🎨 중앙 축과 카드를 심플하게 이어주는 '다이렉트 스마트 선' 렌더링
      const renderSmartLine = (item, isFirst, isEven) => {
          let defaultX = 0;
          let defaultY = 0;
          
          if (isFirst) {
              defaultX = 0;
              defaultY = 64; 
          } else {
              if (window.innerWidth < 768) {
                  defaultX = 32; 
                  defaultY = 0;
              } else {
                  defaultX = isEven ? 48 : -48;
                  defaultY = 0;
              }
          }
          
          const lx = defaultX + (item.cardOffsetX || 0) + (item.lineOffsetX || 0);
          const ly = defaultY + (item.cardOffsetY || 0) + (item.lineOffsetY || 0);
          
          const length = Math.sqrt(lx*lx + ly*ly);
          const angle = Math.atan2(ly, lx) * (180 / Math.PI);

          return (
              <div 
                  className="absolute top-0 left-0 origin-top-left border-t-[1.5px] border-dashed border-indigo-300 pointer-events-none"
                  style={{
                      width: `${length}px`,
                      transform: `rotate(${angle}deg)`,
                      zIndex: -1 // 선이 중심 원 밑으로 깔리게 처리
                  }}
              >
                  {/* 에디팅 모드: 투명한 앵커 핸들 (마우스 오버 시에만 예쁜 보라색 점이 나타남) */}
                  {isEditing && !isExported && (
                      <div 
                          className="absolute right-0 top-0 transform translate-x-1/2 -translate-y-1/2 w-6 h-6 cursor-pointer pointer-events-auto flex items-center justify-center group/line z-50"
                          onPointerDown={(e) => handleLineOffsetStart(e, item.id, item.lineOffsetX, item.lineOffsetY)}
                          title="선 끝을 드래그해 원하는 곳에 연결하세요"
                      >
                          <div className="w-2.5 h-2.5 rounded-full bg-indigo-500 opacity-0 group-hover/line:opacity-100 transition-opacity shadow-[0_0_8px_rgba(99,102,241,0.5)] border border-white"></div>
                      </div>
                  )}
                  {/* 완성본(보기) 모드: 촌스러운 끝점 삭제! 선만 카드에 부드럽게 닿게 처리 */}
              </div>
          );
      };

      return (
        <div>
          {/* 토스트 알림 */}
          {toastMsg && (
            <div className="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-xl z-[200] flex items-center gap-2 animate-bounce text-sm font-medium">
              <CheckCircle size={16} className="text-emerald-400" />
              {toastMsg}
            </div>
          )}

          {/* 상단 컨트롤 바 */}
          {!isExported && (
            <div className="fixed top-4 right-4 z-50 flex items-center gap-2 shadow-sm rounded-full bg-white/90 backdrop-blur-md p-1.5 border border-slate-200">
              <div className="hidden sm:flex items-center ml-3 mr-2">
                {!isSaved ? (
                  <span className="flex items-center gap-1.5 text-[11px] font-bold text-slate-400">

    // --- 갤러리 컴포넌트 ---
    function ImageGallery({ images, isEditing, isLarge, alignRight, alignCenter, onUpdate, openLightbox }) {
      const dragItem = useRef();
      const dragOverItem = useRef();

      const [resizingIdx, setResizingIdx] = useState(null);
      const [resizeStartX, setResizeStartX] = useState(0);
      const [resizeStartY, setResizeStartY] = useState(0);
      const [resizeStartSize, setResizeStartSize] = useState({w: 0, h: 0});
      const [resizeDir, setResizeDir] = useState(null); 

      const [draggingMemo, setDraggingMemo] = useState(null);
      const [memoStartX, setMemoStartX] = useState(0);
      const [memoStartY, setMemoStartY] = useState(0);
      const [memoStartPos, setMemoStartPos] = useState({x: 50, y: 50});

      const handleFileChange = async (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        const newImages = [...images];
        
        const processedImages = await Promise.all(files.map(file => {
          return new Promise((resolve) => {
            if (!file.type.startsWith('image/')) return resolve(null);
            const reader = new FileReader();
            reader.onload = async (ev) => {
              const { url, aspectRatio } = await resizeImage(ev.target.result);
              const initW = isLarge ? 240 : 160;
              const initH = initW / aspectRatio;
              resolve({ id: Date.now() + Math.random(), src: url, aspectRatio: aspectRatio, width: initW, height: initH, link: "", memos: [] });
            };
            reader.readAsDataURL(file);
          });
        }));

        const validImages = processedImages.filter(img => img !== null);
        onUpdate([...newImages, ...validImages]);
        e.target.value = '';
      };

      const handleHTML5DragStart = (e, index) => {
        if (resizingIdx !== null || draggingMemo !== null) { e.preventDefault(); return; }
        dragItem.current = index;
      };
      const handleDragEnter = (e, index) => { dragOverItem.current = index; };
      const handleDragEnd = () => {
        if (dragItem.current === undefined || dragOverItem.current === undefined) return;
        const newImages = [...images];
        const draggedImg = newImages.splice(dragItem.current, 1)[0];
        newImages.splice(dragOverItem.current, 0, draggedImg);
        dragItem.current = null;
        dragOverItem.current = null;
        onUpdate(newImages);
      };

      const removeImage = (indexToRemove) => onUpdate(images.filter((_, idx) => idx !== indexToRemove));
      
      const handleCustomResizeStart = (e, index, currentW, currentH, dir) => {
        e.stopPropagation(); e.preventDefault();
        setResizingIdx(index);
        setResizeDir(dir);
        setResizeStartX(e.clientX);
        setResizeStartY(e.clientY);
        setResizeStartSize({ w: currentW, h: currentH });
      };

      useEffect(() => {
        if (resizingIdx === null) return;
        const handleMove = (e) => {
          let deltaX = e.clientX - resizeStartX; 
          const deltaY = e.clientY - resizeStartY;

          if (alignCenter) deltaX *= 2;
          
          let newW = resizeStartSize.w;
          let newH = resizeStartSize.h;
          
          if (resizeDir === 'e' || resizeDir === 'se') newW = Math.max(60, resizeStartSize.w + deltaX);
          if (resizeDir === 'w' || resizeDir === 'sw') newW = Math.max(60, resizeStartSize.w - deltaX);
          if (resizeDir === 's' || resizeDir === 'se' || resizeDir === 'sw') newH = Math.max(60, resizeStartSize.h + deltaY);

          const newImages = [...images];
          newImages[resizingIdx] = { ...newImages[resizingIdx], width: newW, height: newH };
          onUpdate(newImages);
        };
        const handleUp = () => { setResizingIdx(null); setResizeDir(null); };
        window.addEventListener('pointermove', handleMove);
        window.addEventListener('pointerup', handleUp);
        return () => { window.removeEventListener('pointermove', handleMove); window.removeEventListener('pointerup', handleUp); }
      }, [resizingIdx, resizeStartX, resizeStartY, resizeStartSize, resizeDir, alignCenter]);

      const handleMemoDragStart = (e, imgIndex, memoId, x, y) => {
        e.stopPropagation(); e.preventDefault();
        setDraggingMemo({ imgIndex, memoId });
        setMemoStartX(e.clientX);
        setMemoStartY(e.clientY);
        setMemoStartPos({ x: x || 50, y: y || 50 });
      };

      useEffect(() => {
        if (draggingMemo === null) return;
        const handleMove = (e) => {
          const imgElement = document.getElementById(`img-container-${draggingMemo.imgIndex}`);
          if (!imgElement) return;
          const rect = imgElement.getBoundingClientRect();

          const deltaX = ((e.clientX - memoStartX) / rect.width) * 100;
          const deltaY = ((e.clientY - memoStartY) / rect.height) * 100;

          const newX = Math.max(0, Math.min(100, memoStartPos.x + deltaX));
          const newY = Math.max(0, Math.min(100, memoStartPos.y + deltaY));

          const newImages = [...images];
          const memos = newImages[draggingMemo.imgIndex].memos || [];
          newImages[draggingMemo.imgIndex] = {
            ...newImages[draggingMemo.imgIndex],
            memos: memos.map(m => m.id === draggingMemo.memoId ? { ...m, x: newX, y: newY } : m)
          };
          onUpdate(newImages);
        };
        const handleUp = () => setDraggingMemo(null);
        window.addEventListener('pointermove', handleMove);
        window.addEventListener('pointerup', handleUp);
        return () => { window.removeEventListener('pointermove', handleMove); window.removeEventListener('pointerup', handleUp); }
      }, [draggingMemo, memoStartX, memoStartY, memoStartPos]);

      const updateImageLink = (index) => {
        const newImages = [...images];
        let url = window.prompt("이미지에 연결할 웹사이트 주소(URL)를 입력하세요.\n※ 빈 칸으로 등록하면 링크가 삭제됩니다.", newImages[index].link || "");
        if (url !== null) {
          let finalUrl = url.trim();
          if (finalUrl && !finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) finalUrl = 'https://' + finalUrl;
          newImages[index] = { ...newImages[index], link: finalUrl };
          onUpdate(newImages);
        }
      };

      const addImageMemo = (index) => {
        const text = window.prompt("사진에 남길 메모 내용을 입력하세요.");
        if (text && text.trim()) {
          const newImages = [...images];
          const memos = newImages[index].memos || [];
          newImages[index] = { ...newImages[index], memos: [...memos, { id: Date.now(), text: text.trim(), x: 50, y: 50 }] };
          onUpdate(newImages);
        }
      };

      const editImageMemo = (imgIndex, memoId) => {
        const newImages = [...images];
        const memos = [...(newImages[imgIndex].memos || [])];
        const memoIndex = memos.findIndex(m => m.id === memoId);
        if (memoIndex === -1) return;

        const currentText = memos[memoIndex].text;
        const text = window.prompt("메모 내용을 수정하세요.\n※ 내용을 모두 지우고 확인을 누르면 삭제됩니다.", currentText);
        
        if (text !== null) {
          if (text.trim() === "") memos.splice(memoIndex, 1);
          else memos[memoIndex] = { ...memos[memoIndex], text: text.trim() };
          newImages[imgIndex] = { ...newImages[imgIndex], memos };
          onUpdate(newImages);
        }
      };

      const deleteImageMemo = (imgIndex, memoId) => {
        const newImages = [...images];
        const memos = (newImages[imgIndex].memos || []).filter(m => m.id !== memoId);
        newImages[imgIndex] = { ...newImages[imgIndex], memos };
        onUpdate(newImages);
      }

      if (!isEditing && images.length === 0) return null;

      return (
        <div className={`w-full flex flex-col ${alignCenter ? 'items-center' : (alignRight ? 'items-end' : 'items-start')}`}>
          {isEditing && (
            <div className="flex flex-col mb-4 gap-2 w-full items-center">
              <p className="text-[11px] text-slate-400 font-medium flex items-center gap-1">
                <ImageIcon size={12} /> 테두리를 드래그해 무제한 확장 / 빈 공간을 끌어서 사진 순서 변경
              </p>
            </div>
          )}
          
          <div className={`flex gap-4 flex-wrap w-full ${alignCenter ? 'justify-center' : (alignRight ? 'justify-end' : 'justify-start')} hide-scrollbar`}>
            {images.map((imgObj, index) => {
              const src = imgObj.src || imgObj;
              let w = imgObj.width;
              let h = imgObj.height;
              
              if (!w || !h) {
                 const fallbackSize = imgObj.size || (isLarge ? 240 : 160);
                 const aspectRatio = imgObj.aspectRatio || 1;
                 w = fallbackSize; h = fallbackSize / aspectRatio;
              }
              
              const link = imgObj.link || "";
              let memos = imgObj.memos || [];
              
              const isBeingResized = resizingIdx === index;
              const isBeingMemoDragged = draggingMemo && draggingMemo.imgIndex === index;
              
              const inlineStyle = { width: `${w}px`, height: `${h}px`, minWidth: '60px', minHeight: '60px' };

              return (
                <div 
                  id={`img-container-${index}`} key={imgObj.id || index} draggable={isEditing && !isBeingResized && !isBeingMemoDragged} 
                  style={inlineStyle} onDragStart={(e) => handleHTML5DragStart(e, index)} onDragEnter={(e) => handleDragEnter(e, index)} onDragEnd={handleDragEnd} onDragOver={(e) => e.preventDefault()} onClick={() => !isEditing && openLightbox && openLightbox(images, index)} 
                  className={`shrink-0 bg-slate-50 relative rounded-xl overflow-hidden group shadow-sm border border-slate-200 transition-all ${isEditing ? 'hover:ring-[3px] hover:ring-indigo-100 border-slate-300' : 'cursor-pointer hover:shadow-lg hover:border-indigo-300'}`}
                >
                  <img src={src} alt={`Upload ${index}`} className="w-full h-full object-contain pointer-events-none" />
                  
                  {memos.map((memo) => (
                    <div key={memo.id} className={`absolute bg-white/95 backdrop-blur-sm border border-slate-200 text-slate-800 font-bold text-[13px] px-3 py-1.5 rounded-lg shadow-md whitespace-pre-wrap text-center max-w-[90%] transition-transform ${isEditing ? 'cursor-move hover:border-indigo-400 hover:scale-105' : 'pointer-events-none'}`}
                      style={{ left: `${memo.x}%`, top: `${memo.y}%`, transform: 'translate(-50%, -50%)', zIndex: 20 }}
                      onPointerDown={(e) => isEditing ? handleMemoDragStart(e, index, memo.id, memo.x, memo.y) : undefined}
                      onDoubleClick={(e) => { if(isEditing) { e.stopPropagation(); editImageMemo(index, memo.id); } }}
                      title={isEditing ? "드래그하여 이동, 더블클릭하여 수정" : ""}
                    >
                      {memo.text}
                      {isEditing && (
                         <button onClick={(e) => { e.stopPropagation(); deleteImageMemo(index, memo.id); }} className="absolute -top-1.5 -right-1.5 w-4 h-4 bg-rose-500 hover:bg-rose-600 text-white rounded-full flex items-center justify-center shadow-sm"><X size={10} /></button>
                      )}
                    </div>
                  ))}

                  {!isEditing && link && <div className="absolute top-3 right-3 bg-slate-800/80 backdrop-blur-sm text-white p-1.5 rounded-lg z-10 pointer-events-none shadow-md"><LinkIcon size={12} /></div>}
                  
                  {isEditing && (
                    <>
                      <button onClick={(e) => { e.stopPropagation(); removeImage(index); }} className="absolute top-2 right-2 bg-slate-200 hover:bg-rose-500 text-slate-500 hover:text-white w-6 h-6 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-colors z-30 shadow-sm"><X size={12} /></button>
                      
                      <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity z-10 bg-slate-900/5 pointer-events-none">
                        <div className="flex gap-2 pointer-events-auto">
                          <button onClick={(e) => { e.stopPropagation(); updateImageLink(index); }} className="w-9 h-9 bg-white rounded-full flex items-center justify-center text-slate-600 shadow-md hover:bg-indigo-50 hover:text-indigo-600 transition-colors" title={link ? "링크 수정" : "링크 삽입"}>
                             <LinkIcon size={16} className={link ? "text-indigo-600" : ""} />
                          </button>
                          <button onClick={(e) => { e.stopPropagation(); addImageMemo(index); }} className="w-9 h-9 bg-white rounded-full flex items-center justify-center text-slate-600 shadow-md hover:bg-indigo-50 hover:text-indigo-600 transition-colors" title="새 메모 추가">
                             <MessageSquare size={16} />
                          </button>
                        </div>
                      </div>

                      {alignCenter && (
                        <>
                          <div className="absolute top-0 right-0 w-2 h-full cursor-e-resize z-20 hover:bg-indigo-500/10" onPointerDown={(e) => handleCustomResizeStart(e, index, w, h, 'e')}></div>
                          <div className="absolute top-0 left-0 w-2 h-full cursor-w-resize z-20 hover:bg-indigo-500/10" onPointerDown={(e) => handleCustomResizeStart(e, index, w, h, 'w')}></div>
                          <div className="absolute bottom-1 right-1 w-5 h-5 cursor-se-resize flex items-center justify-center text-slate-400 hover:text-indigo-500 z-30 opacity-0 group-hover:opacity-100 transition-all" onPointerDown={(e) => handleCustomResizeStart(e, index, w, h, 'se')}><ArrowDownRight size={12} /></div>
                          <div className="absolute bottom-1 left-1 w-5 h-5 cursor-sw-resize flex items-center justify-center text-slate-400 hover:text-indigo-500 z-30 opacity-0 group-hover:opacity-100 transition-all" onPointerDown={(e) => handleCustomResizeStart(e, index, w, h, 'sw')}><ArrowDownLeft size={12} /></div>
                        </>
                      )}
                      
                      {alignRight && !alignCenter && (
                        <>
                          <div className="absolute top-0 left-0 w-2 h-full cursor-w-resize z-20 hover:bg-indigo-500/10" onPointerDown={(e) => handleCustomResizeStart(e, index, w, h, 'w')}></div>
                          <div className="absolute bottom-1 left-1 w-5 h-5 cursor-sw-resize flex items-center justify-center text-slate-400 hover:text-indigo-500 z-30 opacity-0 group-hover:opacity-100 transition-all" onPointerDown={(e) => handleCustomResizeStart(e, index, w, h, 'sw')}><ArrowDownLeft size={12} /></div>
                        </>
                      )}

                      {!alignRight && !alignCenter && (
                        <>
                          <div className="absolute top-0 right-0 w-2 h-full cursor-e-resize z-20 hover:bg-indigo-500/10" onPointerDown={(e) => handleCustomResizeStart(e, index, w, h, 'e')}></div>
                          <div className="absolute bottom-1 right-1 w-5 h-5 cursor-se-resize flex items-center justify-center text-slate-400 hover:text-indigo-500 z-30 opacity-0 group-hover:opacity-100 transition-all" onPointerDown={(e) => handleCustomResizeStart(e, index, w, h, 'se')}><ArrowDownRight size={12} /></div>
                        </>
                      )}
                      
                      <div className="absolute bottom-0 left-0 w-full h-2 cursor-s-resize z-20 hover:bg-indigo-500/10" onPointerDown={(e) => handleCustomResizeStart(e, index, w, h, 's')}></div>
                    </>
                  )}
                </div>
              );
            })}
            {isEditing && (
              <label style={{ width: isLarge ? '160px' : '112px', height: isLarge ? '160px' : '112px', minWidth: isLarge ? '160px' : '112px' }} className="shrink-0 bg-white rounded-xl border border-dashed border-slate-300 flex flex-col items-center justify-center cursor-pointer hover:bg-indigo-50 hover:border-indigo-300 transition-all text-slate-400 hover:text-indigo-500 shadow-sm">
                <Plus size={24} />
                <span className="text-xs mt-2 font-bold">사진 추가</span>
                <input type="file" className="hidden" accept="image/*" multiple onChange={handleFileChange} />
              </label>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
