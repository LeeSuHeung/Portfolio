<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포트폴리오 빌더</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (브라우저에서 JSX 컴파일) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 반응형 화면 크기별 중앙점과 카드 사이의 간격 수치 (스마트 연결선 길이 자동 계산용) */
    .gap-vars { --card-gap: 64px; } /* 모바일 */
    @media (min-width: 768px) { .gap-vars { --card-gap: 32px; } } /* 태블릿 */
    @media (min-width: 1024px) { .gap-vars { --card-gap: 48px; } } /* 데스크탑 */
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen pb-20 overflow-x-auto">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useRef, useEffect } = React;

    // --- Lucide 아이콘 ---
    const IconBase = ({ children, size = 24, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );
    const Eye = (p) => <IconBase {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></IconBase>;
    const Edit3 = (p) => <IconBase {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></IconBase>;
    const Download = (p) => <IconBase {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></IconBase>;
    const Trash2 = (p) => <IconBase {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconBase>;
    const ImageIcon = (p) => <IconBase {...p}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></IconBase>;
    const X = (p) => <IconBase {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconBase>;
    const Plus = (p) => <IconBase {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></IconBase>;
    const ChevronLeft = (p) => <IconBase {...p}><polyline points="15 18 9 12 15 6"/></IconBase>;
    const ChevronRight = (p) => <IconBase {...p}><polyline points="9 18 15 12 9 6"/></IconBase>;
    const LinkIcon = (p) => <IconBase {...p}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></IconBase>;
    const MessageSquare = (p) => <IconBase {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></IconBase>;
    const CheckCircle = (p) => <IconBase {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconBase>;
    const RotateCcw = (p) => <IconBase {...p}><polyline points="3 2 3 14 15 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L3 14"/></IconBase>;
    const ArrowDownRight = (p) => <IconBase {...p}><line x1="7" y1="7" x2="17" y2="17"/><polyline points="17 7 17 17 7 17"/></IconBase>;
    const ArrowDownLeft = (p) => <IconBase {...p}><line x1="17" y1="7" x2="7" y2="17"/><polyline points="17 17 7 17 7 7"/></IconBase>;
    const MoveHorizontal = (p) => <IconBase {...p}><polyline points="18 8 22 12 18 16"/><polyline points="6 8 2 12 6 16"/><line x1="2" y1="12" x2="22" y2="12"/></IconBase>;

    // --- 초기 데이터 세팅 ---
    // /* DATA_START */
    const initialHeader = {
      name: "게임 기획자",
      email: "GUPABAL@kakao.com",
      phone: "010-4567-5368"
    };

    const initialTimeline = [
      { id: 7, period: "2023.06 ~ 재직중", company: "블루포션게임즈 (사원)", project: "대표 게임: 에오스블랙 | 엔진: 유니티", tags: "에오스블랙, 구조 설계, 수치 밸런스, 라이브 서비스", images: [], cardOffsetX: 0 },
      { id: 6, period: "2021.05 ~ 2023.05", company: "플레이위드게임즈 (사원)", project: "대표 게임: 씰 온라인 M | 엔진: 유니티", tags: "Unity, 시스템 개편, 경제/전투 밸런스", images: [], cardOffsetX: 0 },
      { id: 5, period: "2019.11 ~ 2021.04", company: "모히또게임즈 (사원)", project: "대표 게임: 히어로볼Z, Project M | 엔진: 유니티", tags: "라이브 서비스, 역기획서, 테이블 설계", images: [], cardOffsetX: 0 },
      { id: 4, period: "2018.02 ~ 2019.02", company: "스톰게임즈 (사원)", project: "대표 게임: 라스트 소울 | 엔진: 유니티", tags: "Unity, 시스템 개편", images: [], cardOffsetX: 0 },
      { id: 3, period: "2017.04 ~ 2018.02", company: "805FACTORY (기획 팀장)", project: "대표 게임: 던전 워커 | 엔진: 유니티", tags: "Unity, 팀 리딩/일정 관리, 전투/경제 밸런스", images: [], cardOffsetX: 0 },
      { id: 2, period: "2012.07 ~ 2016.07", company: "LOGIWARE (대리)", project: "대표 게임: 그랑에이지, 소울슬래쉬 사가 | 엔진: 자체 엔진", tags: "시스템 기획, 글로벌 서비스, 자체 엔진", images: [], cardOffsetX: 0 },
      { id: 1, period: "2011.01 ~ 2012.02", company: "GAMEUS (사원)", project: "대표 게임: H.I.S (히어로즈 인 더 스카이) | 엔진: 유니티", tags: "Unity, 데이터 관리, QA", images: [], cardOffsetX: 0 }
    ];
    // /* DATA_END */

    const isExported = false; 

    // --- 100% 로컬 데이터 전용 로딩 ---
    const loadLocalData = () => {
      if (isExported) return { header: initialHeader, timeline: initialTimeline };
      try {
        const localData = localStorage.getItem('portfolioLocalData');
        if (localData) {
          return JSON.parse(localData);
        }
      } catch(e) { console.error("로컬 데이터를 불러오지 못했습니다.", e); }
      return { header: initialHeader, timeline: initialTimeline };
    };

    // --- 이미지 압축 및 비율 계산 (100% 로컬) ---
    const resizeImage = (dataUrl, maxWidth = 1200) => {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const aspectRatio = img.width / img.height;
          let width = img.width;
          let height = img.height;
          if (width > maxWidth) {
            width = maxWidth;
            height = Math.round(width / aspectRatio);
          }
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve({
            url: canvas.toDataURL('image/jpeg', 0.85),
            aspectRatio: aspectRatio
          });
        };
        img.src = dataUrl;
      });
    };

    // --- 메인 App 컴포넌트 ---
    function App() {
      const initData = loadLocalData();
      const [isEditing, setIsEditing] = useState(true);
      const [header, setHeader] = useState(initData.header);
      const [timeline, setTimeline] = useState(initData.timeline);
      const [lightbox, setLightbox] = useState({ isOpen: false, images: [], currentIndex: 0 });
      const [activeCardId, setActiveCardId] = useState(null);
      const [toastMsg, setToastMsg] = useState('');
      const [isSaved, setIsSaved] = useState(true);

      // --- 여러 상태를 덮어쓰기 없이 한 번에! 동시 업데이트 패치 ---
      const updateTimelineItem = (id, fieldOrUpdates, value) => {
        setTimeline(prev => prev.map(item => {
          if (item.id === id) {
            if (typeof fieldOrUpdates === 'string') {
              return { ...item, [fieldOrUpdates]: value };
            } else {
              return { ...item, ...fieldOrUpdates }; // 다중 필드(가로/세로) 동시 병합 처리
            }
          }
          return item;
        }));
      };

      const removeExperience = (id) => setTimeline(prev => prev.filter(item => item.id !== id));

      const addExperience = () => {
        const newItem = {
          id: Date.now(),
          period: "YYYY.MM ~ YYYY.MM",
          company: "새로운 회사 (직급)",
          project: "대표 게임: 프로젝트명 | 엔진: 유니티",
          tags: "태그1, 태그2",
          images: [],
          cardWidth: null,
          cardHeight: null,
          cardOffsetX: 0
        };
        setTimeline(prev => [newItem, ...prev]); 
      };

      // --- 카드 크기 무제한 확장 로직 ---
      const [resizingCardIdx, setResizingCardIdx] = useState(null);
      const [cardResizeStart, setCardResizeStart] = useState({x: 0, y: 0, w: 0, h: 0, isCentered: false});
      const [cardResizeDir, setCardResizeDir] = useState(null); 

      const handleCardResizeStart = (e, id, dir, isCentered = false) => {
        e.stopPropagation(); 
        e.preventDefault();
        const rect = e.currentTarget.parentElement.getBoundingClientRect();
        setResizingCardIdx(id);
        setCardResizeDir(dir);
        setCardResizeStart({ x: e.clientX, y: e.clientY, w: rect.width, h: rect.height, isCentered });
      };

      useEffect(() => {
        if (resizingCardIdx === null) return;
        const handleMove = (e) => {
          let deltaX = e.clientX - cardResizeStart.x;
          const deltaY = e.clientY - cardResizeStart.y;
          
          if (cardResizeStart.isCentered) {
            deltaX *= 2;
          }

          let newW = cardResizeStart.w;
          let newH = cardResizeStart.h;

          // 방향에 따른 무제한 확장
          if (cardResizeDir === 'e' || cardResizeDir === 'se') {
            newW = Math.max(300, cardResizeStart.w + deltaX);
          }
          if (cardResizeDir === 'w' || cardResizeDir === 'sw') {
            newW = Math.max(300, cardResizeStart.w - deltaX);
          }
          if (cardResizeDir === 's' || cardResizeDir === 'se' || cardResizeDir === 'sw') {
            newH = Math.max(200, cardResizeStart.h + deltaY);
          }
          
          // 가로와 세로 길이를 한번에 묶어서 업데이트! (덮어쓰기 버그 완벽 해결)
          updateTimelineItem(resizingCardIdx, { cardWidth: newW, cardHeight: newH });
        };
        const handleUp = () => { setResizingCardIdx(null); setCardResizeDir(null); };
        window.addEventListener('pointermove', handleMove);
        window.addEventListener('pointerup', handleUp);
        return () => {
          window.removeEventListener('pointermove', handleMove);
          window.removeEventListener('pointerup', handleUp);
        }
      }, [resizingCardIdx, cardResizeStart, cardResizeDir]);

      // --- 카드 좌우 이동 (오프셋) 로직 ---
      const [draggingCardOffset, setDraggingCardOffset] = useState(null);

      const handleCardOffsetStart = (e, id, currentOffset) => {
        e.stopPropagation();
        e.preventDefault();
        setDraggingCardOffset({ id, startX: e.clientX, startOffset: currentOffset || 0 });
      };

      useEffect(() => {
        if (draggingCardOffset === null) return;
        const handleMove = (e) => {
          const deltaX = e.clientX - draggingCardOffset.startX;
          updateTimelineItem(draggingCardOffset.id, 'cardOffsetX', draggingCardOffset.startOffset + deltaX);
        };
        const handleUp = () => setDraggingCardOffset(null);
        window.addEventListener('pointermove', handleMove);
        window.addEventListener('pointerup', handleUp);
        return () => {
          window.removeEventListener('pointermove', handleMove);
          window.removeEventListener('pointerup', handleUp);
        };
      }, [draggingCardOffset]);

      // --- 로컬스토리지 자동 저장 ---
      useEffect(() => {
        if (isExported) return;
        setIsSaved(false);
        const timer = setTimeout(() => {
          try {
            localStorage.setItem('portfolioLocalData', JSON.stringify({ header, timeline }));
            setIsSaved(true);
          } catch(e) { console.error("저장 실패", e); }
        }, 1000); 
        return () => clearTimeout(timer);
      }, [header, timeline]);

      // 글로벌 클립보드 붙여넣기(Ctrl+V)
      useEffect(() => {
        const handleGlobalPaste = async (e) => {
          if (!isEditing || isExported) return;
          const items = e.clipboardData?.items;
          if (!items) return;

          const files = [];
          for (let i = 0; i < items.length; i++) {
            if (items[i].type.indexOf('image') !== -1) {
              files.push(items[i].getAsFile());
            }
          }
          if (files.length === 0) return;

          let targetId = activeCardId;
          if (!targetId && timeline.length > 0) {
            targetId = timeline[0].id;
            setActiveCardId(targetId);
          }
          if (!targetId) return;

          const activeItemIndex = timeline.findIndex(t => t.id === targetId);
          if (activeItemIndex === -1) return;
          const activeItem = timeline[activeItemIndex];
          const isLarge = activeItemIndex === 0;

          const processedImages = await Promise.all(files.map(file => {
            return new Promise((resolve) => {
              const reader = new FileReader();
              reader.onload = async (ev) => {
                const { url, aspectRatio } = await resizeImage(ev.target.result);
                const initW = isLarge ? 240 : 160;
                const initH = initW / aspectRatio;

                resolve({
                  id: Date.now() + Math.random(),
                  src: url,
                  aspectRatio: aspectRatio,
                  width: initW,
                  height: initH,
                  link: "",
                  memos: [] 
                });
              };
              reader.readAsDataURL(file);
            });
          }));

          updateTimelineItem(targetId, 'images', [...activeItem.images, ...processedImages]);
        };

        window.addEventListener('paste', handleGlobalPaste);
        return () => window.removeEventListener('paste', handleGlobalPaste);
      }, [isEditing, activeCardId, timeline]);

      const handleReset = () => {
        if (window.confirm("경고: 모든 변경사항과 추가한 사진이 삭제되고 빈 화면으로 초기화됩니다.\n정말 초기화하시겠습니까?")) {
          setHeader({ name: "게임 기획자", email: "GUPABAL@kakao.com", phone: "010-4567-5368" });
          setTimeline([]); 
          localStorage.removeItem('portfolioLocalData'); 
          setToastMsg("포트폴리오가 빈 화면으로 초기화되었습니다.");
          setTimeout(() => setToastMsg(''), 4000);
        }
      };

      const handleDownloadHTML = () => {
        const scriptElement = document.querySelector('script[type="text/babel"]');
        if (!scriptElement) {
          setToastMsg("HTML 코드를 생성할 수 없습니다.");
          setTimeout(() => setToastMsg(''), 3000);
          return;
        }
        
        let code = scriptElement.innerText;
        const dataReplacement = `\n    const initialHeader = ${JSON.stringify(header, null, 2)};\n    const initialTimeline = ${JSON.stringify(timeline, null, 2)};\n    `;
        code = code.replace(/\/\/ \/\* DATA_START \*\/[\s\S]*?\/\/ \/\* DATA_END \*\//, `// /* DATA_START */${dataReplacement}// /* DATA_END */`);
        code = code.replace(/const \[isEditing, setIsEditing\] = useState\(true\);/, `const [isEditing, setIsEditing] = useState(false);`);
        code = code.replace(/const isExported = false;/, `const isExported = true;`);

        const scriptClose = '<' + '/script>';
        const fullHtml = `<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${header.name} 포트폴리오</title>
  <script src="https://cdn.tailwindcss.com">${scriptClose}
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin>${scriptClose}
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin>${scriptClose}
  <script src="https://unpkg.com/@babel/standalone/babel.min.js">${scriptClose}
  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .gap-vars { --card-gap: 64px; }
    @media (min-width: 768px) { .gap-vars { --card-gap: 32px; } }
    @media (min-width: 1024px) { .gap-vars { --card-gap: 48px; } }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen pb-20 overflow-x-auto">
  <div id="root"></div>
  <script type="text/babel">
${code}
  ${scriptClose}
</body>
</html>`;

        const blob = new Blob([fullHtml], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'portfolio_final.html';
        a.click();
        URL.revokeObjectURL(url);
        
        setToastMsg("편집이 완벽하게 잠긴 최종 포트폴리오 HTML 파일이 다운로드되었습니다!");
        setTimeout(() => setToastMsg(''), 4000);
      };

      return (
        <div>
          {toastMsg && (
            <div className="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl z-[200] flex items-center gap-2 animate-bounce">
              <CheckCircle size={18} className="text-green-400" />
              {toastMsg}
            </div>
          )}

          {!isExported && (
            <div className="fixed top-4 right-4 z-50 flex items-center gap-3 shadow-lg rounded-full bg-white p-2 border border-gray-200">
              <div className="hidden sm:flex items-center ml-2 mr-1">
                {!isSaved ? (
                  <span className="flex items-center gap-1.5 text-xs font-semibold text-gray-500 bg-gray-100 px-3 py-1.5 rounded-full">
                    <svg className="animate-spin h-3.5 w-3.5 text-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    자동 저장 중...
                  </span>
                ) : (
                  <span className="flex items-center gap-1.5 text-xs font-semibold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-full border border-indigo-100 transition-all">
                    <CheckCircle size={14} />
                    로컬 저장됨
                  </span>
                )}
              </div>

              <div className="h-6 w-px bg-gray-200 hidden sm:block"></div>

              <button onClick={handleReset} className="flex items-center gap-1.5 px-3 py-2 rounded-full font-semibold transition-colors text-red-600 hover:bg-red-50" title="모든 변경사항을 삭제하고 처음 상태로 되돌립니다.">
                <RotateCcw size={18} />
                <span className="hidden sm:inline text-sm">초기화</span>
              </button>

              <div className="h-6 w-px bg-gray-200 hidden sm:block"></div>

              <button onClick={() => setIsEditing(!isEditing)} className={`flex items-center gap-2 px-4 py-2 rounded-full font-semibold transition-colors ${isEditing ? 'bg-indigo-100 text-indigo-700 hover:bg-indigo-200' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>
                {isEditing ? <Eye size={18} /> : <Edit3 size={18} />}
                {isEditing ? "미리보기 모드" : "편집 모드"}
              </button>
              <button onClick={handleDownloadHTML} className="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-5 rounded-full transition duration-300 flex items-center gap-2">
                <Download size={18} /> HTML 다운로드
              </button>
            </div>
          )}

          <header className="max-w-4xl mx-auto pt-20 pb-12 px-6 text-center">
            {isEditing && !isExported ? (
              <div className="space-y-4 max-w-2xl mx-auto border-b border-dashed border-gray-200 pb-8">
                <input value={header.name} onChange={(e) => setHeader({...header, name: e.target.value})} className="text-4xl md:text-5xl font-extrabold text-gray-900 text-center w-full bg-transparent border-b-2 border-dashed border-gray-300 focus:border-blue-500 outline-none pb-2" placeholder="이름 또는 직무" />
                <div className="flex justify-center gap-4 text-sm text-gray-500 mt-4">

                  <div className="mt-4" onClick={(e) => e.stopPropagation()}>
                    <a href={lightbox.images[lightbox.currentIndex].link} target="_blank" rel="noopener noreferrer" className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-full font-bold shadow-lg flex items-center gap-2">
                      <LinkIcon size={16} /> 연결된 링크로 이동
                    </a>
                  </div>
                )}
                <div className="absolute -bottom-8 left-0 right-0 text-center text-white/70 text-sm font-medium">{lightbox.currentIndex + 1} / {lightbox.images.length}</div>
              </div>

              {lightbox.images.length > 1 && (
                <button className="absolute right-4 md:right-10 text-white hover:text-gray-300 z-[101] bg-black/50 hover:bg-black/80 p-2 rounded-full" onClick={(e) => { e.stopPropagation(); setLightbox({ ...lightbox, currentIndex: (lightbox.currentIndex + 1) % lightbox.images.length }); }}><ChevronRight size={48} /></button>
              )}
            </div>
          )}
        </div>
      );
    }

    // --- 갤러리 컴포넌트 ---
    function ImageGallery({ images, isEditing, isLarge, alignRight, alignCenter, onUpdate, openLightbox }) {
      const dragItem = useRef();
      const dragOverItem = useRef();

      // 마우스 드래그 크기 조절 상태
      const [resizingIdx, setResizingIdx] = useState(null);
      const [resizeStartX, setResizeStartX] = useState(0);
      const [resizeStartY, setResizeStartY] = useState(0);
      const [resizeStartSize, setResizeStartSize] = useState({w: 0, h: 0});
      const [resizeDir, setResizeDir] = useState(null); // 'e', 'w', 's', 'se', 'sw'

      // 메모 드래그 이동 상태
      const [draggingMemo, setDraggingMemo] = useState(null); // { imgIndex, memoId }
      const [memoStartX, setMemoStartX] = useState(0);
      const [memoStartY, setMemoStartY] = useState(0);
      const [memoStartPos, setMemoStartPos] = useState({x: 50, y: 50});

      const handleFileChange = async (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        const newImages = [...images];
        
        const processedImages = await Promise.all(files.map(file => {
          return new Promise((resolve) => {
            if (!file.type.startsWith('image/')) return resolve(null);
            const reader = new FileReader();
            reader.onload = async (ev) => {
              const { url, aspectRatio } = await resizeImage(ev.target.result);
              
              const initW = isLarge ? 240 : 160;
              const initH = initW / aspectRatio;

              resolve({ 
                id: Date.now() + Math.random(), 
                src: url, 
                aspectRatio: aspectRatio, 
                width: initW,
                height: initH,
                link: "", 
                memos: [] 
              });
            };
            reader.readAsDataURL(file);
          });
        }));

        const validImages = processedImages.filter(img => img !== null);
        onUpdate([...newImages, ...validImages]);
        e.target.value = '';
      };

      const handleHTML5DragStart = (e, index) => {
        if (resizingIdx !== null || draggingMemo !== null) { e.preventDefault(); return; }
        dragItem.current = index;
      };
      const handleDragEnter = (e, index) => { dragOverItem.current = index; };
      const handleDragEnd = () => {
        if (dragItem.current === undefined || dragOverItem.current === undefined) return;
        const newImages = [...images];
        const draggedImg = newImages.splice(dragItem.current, 1)[0];
        newImages.splice(dragOverItem.current, 0, draggedImg);
        dragItem.current = null;
        dragOverItem.current = null;
        onUpdate(newImages);
      };

      const removeImage = (indexToRemove) => onUpdate(images.filter((_, idx) => idx !== indexToRemove));
      
      // 🛠 마우스 드래그 이미지 자유 크기 조절 로직
      const handleCustomResizeStart = (e, index, currentW, currentH, dir) => {
        e.stopPropagation(); e.preventDefault();
        setResizingIdx(index);
        setResizeDir(dir);
        setResizeStartX(e.clientX);
        setResizeStartY(e.clientY);
        setResizeStartSize({ w: currentW, h: currentH });
      };

      useEffect(() => {
        if (resizingIdx === null) return;
        const handleMove = (e) => {
          let deltaX = e.clientX - resizeStartX; 
          const deltaY = e.clientY - resizeStartY;

          // 중앙 정렬된 이미지의 양방향 확장을 위해 보정 (마우스가 가장자리를 따라가도록)
          if (alignCenter) {
            deltaX *= 2;
          }
          
          let newW = resizeStartSize.w;
          let newH = resizeStartSize.h;
          
          if (resizeDir === 'e' || resizeDir === 'se') {
            newW = Math.max(60, resizeStartSize.w + deltaX);
          }
          if (resizeDir === 'w' || resizeDir === 'sw') {
            newW = Math.max(60, resizeStartSize.w - deltaX);
          }
          if (resizeDir === 's' || resizeDir === 'se' || resizeDir === 'sw') {
            newH = Math.max(60, resizeStartSize.h + deltaY);
          }

          const newImages = [...images];
          newImages[resizingIdx] = { 
            ...newImages[resizingIdx], 
            width: newW,
            height: newH
          };
          onUpdate(newImages);
        };
        const handleUp = () => { setResizingIdx(null); setResizeDir(null); };
        window.addEventListener('pointermove', handleMove);
        window.addEventListener('pointerup', handleUp);
        return () => {
          window.removeEventListener('pointermove', handleMove);
          window.removeEventListener('pointerup', handleUp);
        }
      }, [resizingIdx, resizeStartX, resizeStartY, resizeStartSize, resizeDir, alignCenter]);

      // 🛠 메모 박스 드래그 이동 로직
      const handleMemoDragStart = (e, imgIndex, memoId, x, y) => {
        e.stopPropagation(); e.preventDefault();
        setDraggingMemo({ imgIndex, memoId });
        setMemoStartX(e.clientX);
        setMemoStartY(e.clientY);
        setMemoStartPos({ x: x || 50, y: y || 50 });
      };

      useEffect(() => {
        if (draggingMemo === null) return;
        const handleMove = (e) => {
          const imgElement = document.getElementById(`img-container-${draggingMemo.imgIndex}`);
          if (!imgElement) return;
          const rect = imgElement.getBoundingClientRect();

          const deltaX = ((e.clientX - memoStartX) / rect.width) * 100;
          const deltaY = ((e.clientY - memoStartY) / rect.height) * 100;

          const newX = Math.max(0, Math.min(100, memoStartPos.x + deltaX));
          const newY = Math.max(0, Math.min(100, memoStartPos.y + deltaY));

          const newImages = [...images];
          const memos = newImages[draggingMemo.imgIndex].memos || [];
          newImages[draggingMemo.imgIndex] = {
            ...newImages[draggingMemo.imgIndex],
            memos: memos.map(m => m.id === draggingMemo.memoId ? { ...m, x: newX, y: newY } : m)
          };
          onUpdate(newImages);
        };
        const handleUp = () => setDraggingMemo(null);
        window.addEventListener('pointermove', handleMove);
        window.addEventListener('pointerup', handleUp);
        return () => {
          window.removeEventListener('pointermove', handleMove);
          window.removeEventListener('pointerup', handleUp);
        }
      }, [draggingMemo, memoStartX, memoStartY, memoStartPos]);


      const updateImageLink = (index) => {
        const newImages = [...images];
        let url = window.prompt("이미지에 연결할 웹사이트 주소(URL)를 입력하세요.\n※ 빈 칸으로 등록하면 링크가 삭제됩니다.", newImages[index].link || "");
        if (url !== null) {
          let finalUrl = url.trim();
          if (finalUrl && !finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) finalUrl = 'https://' + finalUrl;
          newImages[index] = { ...newImages[index], link: finalUrl };
          onUpdate(newImages);
        }
      };

      // 💬 다중 메모 박스 추가
      const addImageMemo = (index) => {
        const text = window.prompt("사진에 남길 메모 내용을 입력하세요.");
        if (text && text.trim()) {
          const newImages = [...images];
          const memos = newImages[index].memos || [];
          
          newImages[index] = { 
            ...newImages[index], 
            memos: [...memos, { id: Date.now(), text: text.trim(), x: 50, y: 50 }] 
          };
          onUpdate(newImages);
        }
      };

      // 💬 개별 메모 수정
      const editImageMemo = (imgIndex, memoId) => {
        const newImages = [...images];
        const memos = [...(newImages[imgIndex].memos || [])];
        const memoIndex = memos.findIndex(m => m.id === memoId);
        if (memoIndex === -1) return;

        const currentText = memos[memoIndex].text;
        const text = window.prompt("메모 내용을 수정하세요.\n※ 내용을 모두 지우고 확인을 누르면 삭제됩니다.", currentText);
        
        if (text !== null) {
          if (text.trim() === "") {
            memos.splice(memoIndex, 1);
          } else {
            memos[memoIndex] = { ...memos[memoIndex], text: text.trim() };
          }
          newImages[imgIndex] = { ...newImages[imgIndex], memos };
          onUpdate(newImages);
        }
      };

      // 💬 개별 메모 삭제 (X 버튼)
      const deleteImageMemo = (imgIndex, memoId) => {
        const newImages = [...images];
        const memos = (newImages[imgIndex].memos || []).filter(m => m.id !== memoId);
        newImages[imgIndex] = { ...newImages[imgIndex], memos };
        onUpdate(newImages);
      }

      if (!isEditing && images.length === 0) return null;

      return (
        <div className={`w-full mb-4 flex flex-col ${alignCenter ? 'items-center' : (alignRight ? 'items-end' : 'items-start')}`}>
          {isEditing && (
            <div className="flex flex-col mb-2 gap-2 w-full items-center">
              <p className="text-xs text-gray-500 font-semibold flex items-center gap-1 bg-gray-100 px-3 py-1.5 rounded-md text-center">
                <ImageIcon size={14} /> 테두리를 드래그하여 가로/세로 무제한 확장 (이미지는 원본 비율을 유지하며 잘리지 않습니다)
              </p>
            </div>
          )}
          
          {/* 이미지가 커지면 줄바꿈(flex-wrap)되도록 설정 */}
          <div className={`flex gap-4 flex-wrap py-4 px-2 w-full ${alignCenter ? 'justify-center' : (alignRight ? 'justify-end' : 'justify-start')} hide-scrollbar`}>
            {images.map((imgObj, index) => {
              const src = imgObj.src || imgObj;
              // 호환성 처리
              let w = imgObj.width;
              let h = imgObj.height;
              
              if (!w || !h) {
                 const fallbackSize = imgObj.size || (isLarge ? 240 : 160);
                 const aspectRatio = imgObj.aspectRatio || 1;
                 w = fallbackSize;
                 h = fallbackSize / aspectRatio;
              }
              
              const link = imgObj.link || "";
              let memos = imgObj.memos || [];
              
              const isBeingResized = resizingIdx === index;
              const isBeingMemoDragged = draggingMemo && draggingMemo.imgIndex === index;
              
              // 틀이 크기에 맞춰 자유롭게 조정되도록 스타일 지정
              const inlineStyle = { 
                  width: `${w}px`, 
                  height: `${h}px`, 
                  minWidth: '60px',
                  minHeight: '60px'
              };

              return (
                <div 
                  id={`img-container-${index}`}
                  key={imgObj.id || index} 
                  draggable={isEditing && !isBeingResized && !isBeingMemoDragged} 
                  style={inlineStyle} 
                  onDragStart={(e) => handleHTML5DragStart(e, index)} 
                  onDragEnter={(e) => handleDragEnter(e, index)} 
                  onDragEnd={handleDragEnd} 
                  onDragOver={(e) => e.preventDefault()} 
                  onClick={() => !isEditing && openLightbox && openLightbox(images, index)} 
                  className={`shrink-0 bg-gray-100 relative rounded-md overflow-hidden group shadow-sm border border-gray-200 transition-all ${isEditing ? 'hover:ring-4 hover:ring-blue-200' : 'cursor-pointer hover:shadow-xl hover:ring-2 hover:ring-blue-300'}`}
                >
                  {/* object-contain 속성으로 이미지가 잘리지 않고 100% 모두 표시됨 */}
                  <img src={src} alt={`Upload ${index}`} className="w-full h-full object-contain pointer-events-none" />
                  
                  {/* 💬 자유형 다중 텍스트 메모 박스 */}
                  {memos.map((memo) => (
                    <div 
                      key={memo.id}
                      className={`absolute bg-white/95 border border-gray-200 text-gray-900 font-bold text-xs md:text-sm px-3 py-2 rounded-lg shadow-lg whitespace-pre-wrap text-center max-w-[90%] transition-transform ${isEditing ? 'cursor-move hover:ring-2 hover:ring-blue-400 hover:scale-105' : 'pointer-events-none'}`}
                      style={{ left: `${memo.x}%`, top: `${memo.y}%`, transform: 'translate(-50%, -50%)', zIndex: 20 }}
                      onPointerDown={(e) => isEditing ? handleMemoDragStart(e, index, memo.id, memo.x, memo.y) : undefined}
                      onDoubleClick={(e) => { if(isEditing) { e.stopPropagation(); editImageMemo(index, memo.id); } }}
                      title={isEditing ? "드래그하여 이동, 더블클릭하여 수정" : ""}
                    >
                      {memo.text}
                      {/* 메모 개별 삭제(X) 버튼 */}
                      {isEditing && (
                         <button onClick={(e) => { e.stopPropagation(); deleteImageMemo(index, memo.id); }} className="absolute -top-2 -right-2 w-5 h-5 bg-red-500 hover:bg-red-600 text-white rounded-full flex items-center justify-center shadow-md">
                           <X size={12} />
                         </button>
                      )}
                    </div>
                  ))}

                  {!isEditing && link && <div className="absolute top-2 right-2 bg-black/70 text-white p-1.5 rounded-md z-10 pointer-events-none shadow-sm backdrop-blur-sm"><LinkIcon size={14} /></div>}
                  
                  {isEditing && (
                    <>
                      {/* 이미지 전체 삭제 버튼 (우측 상단 고정) */}
                      <button onClick={(e) => { e.stopPropagation(); removeImage(index); }} className="absolute top-2 right-2 bg-red-500/90 hover:bg-red-600 text-white w-7 h-7 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity z-30 shadow-md"><X size={16} /></button>
                      
                      {/* 중앙 배열된 편집 오버레이 */}
                      <div className="absolute inset-0 flex items-center justify-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity z-10 bg-black/10 backdrop-blur-[1px] pointer-events-none">
                        <div className="flex gap-3 pointer-events-auto">
                          <button onClick={(e) => { e.stopPropagation(); updateImageLink(index); }} className="w-10 h-10 bg-white rounded-full flex items-center justify-center text-gray-700 shadow-md hover:bg-gray-100 transition-colors" title={link ? "링크 수정" : "링크 삽입"}>
                             <LinkIcon size={18} className={link ? "text-blue-600" : ""} />
                          </button>
                          <button onClick={(e) => { e.stopPropagation(); addImageMemo(index); }} className="w-10 h-10 bg-white rounded-full flex items-center justify-center text-gray-700 shadow-md hover:bg-gray-100 transition-colors" title="새 메모 박스 추가">
                             <MessageSquare size={18} />
                          </button>
                        </div>
                      </div>

                      {/* 🛠 자유 크기 조절 핸들 (위치/정렬에 따라 제공되는 핸들 다름) */}
                      {alignCenter && (
                        <>
                          <div className="absolute top-0 right-0 w-3 h-full cursor-e-resize z-20 hover:bg-blue-500/50 transition-colors" onPointerDown={(e) => handleCustomResizeStart(e, index, w, h, 'e')}></div>
                          <div className="absolute top-0 left-0 w-3 h-full cursor-w-resize z-20 hover:bg-blue-500/50 transition-colors" onPointerDown={(e) => handleCustomResizeStart(e, index, w, h, 'w')}></div>
                          <div className="absolute bottom-0 right-0 w-8 h-8 cursor-se-resize flex items-end justify-end p-1.5 text-white bg-blue-500 rounded-tl-md z-30 opacity-0 group-hover:opacity-100 transition-opacity" onPointerDown={(e) => handleCustomResizeStart(e, index, w, h, 'se')} title="드래그하여 크기 조절">
                            <ArrowDownRight size={16} />
                          </div>
                          <div className="absolute bottom-0 left-0 w-8 h-8 cursor-sw-resize flex items-end justify-start p-1.5 text-white bg-blue-500 rounded-tr-md z-30 opacity-0 group-hover:opacity-100 transition-opacity" onPointerDown={(e) => handleCustomResizeStart(e, index, w, h, 'sw')} title="드래그하여 크기 조절">
                            <ArrowDownLeft size={16} />
                          </div>
                        </>
                      )}
                      
                      {alignRight && !alignCenter && (
                        <>
                          <div className="absolute top-0 left-0 w-3 h-full cursor-w-resize z-20 hover:bg-blue-500/50 transition-colors" onPointerDown={(e) => handleCustomResizeStart(e, index, w, h, 'w')}></div>
                          <div className="absolute bottom-0 left-0 w-8 h-8 cursor-sw-resize flex items-end justify-start p-1.5 text-white bg-blue-500 rounded-tr-md z-30 opacity-0 group-hover:opacity-100 transition-opacity" onPointerDown={(e) => handleCustomResizeStart(e, index, w, h, 'sw')} title="드래그하여 크기 조절">
                            <ArrowDownLeft size={16} />
                          </div>
                        </>
                      )}

                      {!alignRight && !alignCenter && (
                        <>
                          <div className="absolute top-0 right-0 w-3 h-full cursor-e-resize z-20 hover:bg-blue-500/50 transition-colors" onPointerDown={(e) => handleCustomResizeStart(e, index, w, h, 'e')}></div>
                          <div className="absolute bottom-0 right-0 w-8 h-8 cursor-se-resize flex items-end justify-end p-1.5 text-white bg-blue-500 rounded-tl-md z-30 opacity-0 group-hover:opacity-100 transition-opacity" onPointerDown={(e) => handleCustomResizeStart(e, index, w, h, 'se')} title="드래그하여 크기 조절">
                            <ArrowDownRight size={16} />
                          </div>
                        </>
                      )}
                      
                      {/* 공통 적용 하단 핸들 */}
                      <div className="absolute bottom-0 left-0 w-full h-3 cursor-s-resize z-20 hover:bg-blue-500/50 transition-colors" onPointerDown={(e) => handleCustomResizeStart(e, index, w, h, 's')}></div>
                    </>
                  )}
                </div>
              );
            })}
            {isEditing && (
              <label style={{ width: isLarge ? '160px' : '112px', height: isLarge ? '160px' : '112px', minWidth: isLarge ? '160px' : '112px' }} className="shrink-0 bg-gray-50 rounded-xl border-2 border-dashed border-gray-300 flex flex-col items-center justify-center cursor-pointer hover:bg-blue-50 hover:border-blue-300 transition-all text-gray-400 hover:text-blue-500">
                <Plus size={28} />
                <span className="text-sm mt-2 font-bold">사진 추가</span>
                <input type="file" className="hidden" accept="image/*" multiple onChange={handleFileChange} />
              </label>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
